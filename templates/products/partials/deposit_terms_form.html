<form method="post" class="stack-md token-terms-form">
    {% csrf_token %}

    <div class="filter-bar token-terms-fields">
        <label class="filter-field">
            <span>{{ terms_form.interest_mode.label }}</span>
            {{ terms_form.interest_mode }}
            {% if terms_form.interest_mode.help_text %}
                <small class="muted">{{ terms_form.interest_mode.help_text }}</small>
            {% endif %}
            {% if terms_form.interest_mode.errors %}
                <span class="field-error">{{ terms_form.interest_mode.errors|join:', ' }}</span>
            {% endif %}
        </label>
        <label class="filter-field">
            <span>{{ terms_form.income_account.label }}</span>
            {{ terms_form.income_account }}
            {% if terms_form.income_account.help_text %}
                <small class="muted">{{ terms_form.income_account.help_text }}</small>
            {% endif %}
            {% if terms_form.income_account.errors %}
                <span class="field-error">{{ terms_form.income_account.errors|join:', ' }}</span>
            {% endif %}
        </label>
        <label class="filter-field">
            <span>{{ terms_form.annual_rate_pct.label }}</span>
            {{ terms_form.annual_rate_pct }}
            {% if terms_form.annual_rate_pct.errors %}
                <span class="field-error">{{ terms_form.annual_rate_pct.errors|join:', ' }}</span>
            {% endif %}
        </label>
        <label class="filter-field">
            <span>{{ terms_form.maturity_date.label }}</span>
            {{ terms_form.maturity_date }}
            {% if terms_form.maturity_date.errors %}
                <span class="field-error">{{ terms_form.maturity_date.errors|join:', ' }}</span>
            {% endif %}
        </label>
        <label class="filter-field">
            <span>{{ terms_form.income_schedule.label }}</span>
            {{ terms_form.income_schedule }}
            {% if terms_form.income_schedule.errors %}
                <span class="field-error">{{ terms_form.income_schedule.errors|join:', ' }}</span>
            {% endif %}
        </label>
        <label class="filter-field">
            <span>{{ terms_form.next_income_date.label }}</span>
            {{ terms_form.next_income_date }}
            {% if estimated_next_income_date %}
                <small class="muted">Forecast from history: <span class="font-mono">{{ estimated_next_income_date|display_date }}</span></small>
            {% endif %}
            {% if terms_form.next_income_date.errors %}
                <span class="field-error">{{ terms_form.next_income_date.errors|join:', ' }}</span>
            {% endif %}
        </label>
    </div>

    {% if terms_form.non_field_errors %}
        <div class="message error">{{ terms_form.non_field_errors }}</div>
    {% endif %}

    <div class="form-actions">
        <button type="submit" class="button" name="action" value="save_terms">Save terms</button>
        <button type="submit" class="button button-secondary" name="action" value="recompute_next_income">
            Estimate next income date
        </button>
    </div>

    <p class="muted">
        {% if product.terms_updated_at %}Last saved {{ product.terms_updated_at|display_datetime }}.{% endif %}
    </p>
</form>
